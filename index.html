<html lang="de">
<head>

<style>

:root{

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);font-size:14px;-webkit-font-smoothing:antialiased;min-height:100vh}
.topbar{background:var(--black);color:white;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between}
.tbl{display:flex;align-items:center;gap:10px}
.tbl-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700}
.tdiv{width:1px;height:22px;background:rgba(255,255,255,.15)}
.tname{font-size:11px;opacity:.6;letter-spacing:.02em}
.tbr{display:flex;align-items:center;gap:8px}
.brole{background:white;color:var(--black);font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.05em}
.blogout{background:transparent;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.8);padding:5px 11px;border-radius:var(--rsm);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif}
.blogout:hover{border-color:white;color:white}
.nav{background:white;border-bottom:1.5px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 12px}

.ntab{padding:12px 14px;font-size:13px;font-weight:500;color:var(--light);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;margin-bottom:-1.5px;letter-spacing:.01em}
.ntab.active{color:var(--black);border-bottom-color:var(--black);font-weight:600}
.ntab:hover{color:var(--dark)}
.main{padding:16px;max-width:960px;margin:0 auto}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:20px;margin-bottom:14px;border:1px solid var(--border)}
.ctitle{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--black);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.scard{background:white;border:1.5px solid var(--border);border-radius:var(--rsm);padding:14px 10px;text-align:center}
.snum{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--black)}

.strend.up{color:var(--green)}.strend.down{color:var(--red)}
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--cream);color:var(--mid);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:8px 10px;text-align:left;border-bottom:1.5px solid var(--border)}
td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:#fafafa}
.st{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.03em}
.st-good{background:var(--green-lt);color:var(--green)}

.st-bad{background:var(--red-lt);color:var(--red)}

.rank-2{background:var(--cream);color:var(--mid)}
.rank-3{background:var(--red-lt);color:var(--red)}

/* LOGIN */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--black);padding:40px 20px}
.lcard{background:white;border-radius:16px;padding:40px 36px;width:100%;max-width:400px;text-align:center}
.lcard h2{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:4px;color:var(--black)}

.btn-login{width:100%;padding:13px;background:var(--black);color:white;border:none;border-radius:var(--rsm);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.03em;margin-top:6px}

<script>
// ════════════════════════════════════════════════════
// AMPEL-REGELN
// ════════════════════════════════════════════════════
function retSt(v) {
  if (v == null) return 'st-warn';
  if (v >= 12 && v <= 17) return 'st-good';   // grün
  if (v > 17 && v <= 22) return 'st-warn';    // gelb
  return 'st-bad';                              // rot
}
function stlSt(v) {
  if (v == null) return 'st-warn';
  if (v >= 85 && v <= 120) return 'st-good';  // grün
  if ((v >= 70 && v < 85) || (v > 120 && v <= 140)) return 'st-warn'; // gelb
  return 'st-bad';                              // rot
}

// ════════════════════════════════════════════════════
// GOOGLE SHEETS LADEN
// ════════════════════════════════════════════════════
const CONFIG_KEY = 'bb_sheets_url';
const FILIAL_MAP = {
  'Brandstraße':'B1','Oberer Markt':'B5','Norisstraße':'B7',
  'Knebelstraße':'B8','Waldluststraße':'B11','Laufamholzstraße':'B12','Vogelherdstraße':'B16'
};
const CODES = ['B1','B5','B7','B8','B11','B12','B16'];
const MONATE = [['2026-01',31],['2026-02',28],['2026-03',31]];
const MNAMES = {'2026-01':'Januar','2026-02':'Februar','2026-03':'März'};

let sheetsUrl = localStorage.getItem(CONFIG_KEY) || '';
let liveData = null;  // aus Sheets geladen
let c1=null, c2=null;

function toCsvUrl(url, sheet) {
  const m = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if (!m) return null;
  return `https://docs.google.com/spreadsheets/d/${m[1]}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet)}`;
}

function parseCSV(text) {
  CSV_SEP = detectSeparator(text);
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  // Normalize headers: strip quotes, lowercase, collapse whitespace
  const headers = parseCSVRow(lines[0]).map(h => h.trim()
    .replace(/^["']+|["']+$/g,'')  // strip surrounding quotes
    .toLowerCase()
    .replace(/[\r\n\t]+/g,' ')
    .replace(/\s+/g,' ')
    .trim());
  return lines.slice(1).map(line => {
    const vals = parseCSVRow(line);
    const obj = {};
    headers.forEach((h,i) => {
      obj[h] = (vals[i]||'').trim().replace(/^["']+|["']+$/g,'').trim();
    });
    return obj;
  }).filter(r => r['datum'] && r['datum'].trim());
}

function detectSeparator(text) {
  const firstLine = text.split('\n')[0];
  const commas = (firstLine.match(/,/g)||[]).length;
  const semis = (firstLine.match(/;/g)||[]).length;
  return semis > commas ? ';' : ',';
}
let CSV_SEP = ',';
function parseCSVRow(line) {
  // Robust parser: handles quoted fields, removes surrounding quotes from values
  const res=[]; let cur='', inQ=false;
  for (let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){
      if(inQ && line[i+1]==='"'){cur+='"';i++;} // escaped quote
      else inQ=!inQ;
      continue;
    }
    if(ch===CSV_SEP&&!inQ){res.push(cur);cur='';continue;}
    cur+=ch;
  }
  res.push(cur);
  return res;
}

function parseNum(s) {
  if (!s) return null;
  // €, %, Leerzeichen entfernen; dann deutsches Format 1.234,56 -> 1234.56
  const clean = s.replace(/[€%\s]/g,'').replace(/\./g,'').replace(',','.');
  const n = parseFloat(clean);
  return isNaN(n) ? null : n;
}

async function loadSheet(url, sheetName) {
  const csvUrl = toCsvUrl(url, sheetName);
  if (!csvUrl) throw new Error('Ungültige URL');
  const res = await fetch(csvUrl);
  if (!res.ok) throw new Error(`HTTP ${res.status} – ist das Sheet öffentlich geteilt?`);
  return parseCSV(await res.text());
}

function processRows(rows, code) {
  // Spalten-Erkennung – exakt wie in der Excel + flexible Fallbacks
  // Excel-Spalten: Datum | Wochentag | Soll Umsatz | Soll-Umsatz fortlaufend |
  //   Ist Umsatz | Differenz | Retoure | Retoure Ist in % | Kunden |
  //   Durch-schnitts-bon | VK Std Soll | VK - Std ist | Differenz |
  //   Std - Leistung Soll | Std - Leistung Ist | Differenz
  const g = (r, ...keys) => { for (const k of keys) { const v = r[k]; if (v !== undefined && v !== '') return v; } return ''; };
  const normRow = r => {
    const datum = g(r,'datum');
    const wt    = g(r,'wochentag');
    // Ist-Umsatz: Excel-Header heißt "ist\n umsatz" → nach CSV-Export: "ist  umsatz" oder ähnlich
    const ist   = parseNum(g(r,'ist umsatz','ist\n umsatz','ist-umsatz','ist_umsatz','umsatz'));
    // Soll-Umsatz: erste Soll-Spalte (nicht die fortlaufende)
    const soll  = parseNum(g(r,'soll\n umsatz','soll umsatz','soll-umsatz','soll_umsatz'));
    // Retoure in %: Excel "retoure ist\n in %" → CSV: "retoure ist  in %"
    let retPct= parseNum(g(r,'retoure ist\n in %','retoure ist  in %','retoure ist in %','retourenquote %','retourenquote%','retoure %','retoure_pct','retourenquote'));
    // Google Sheets exportiert Prozentwerte manchmal als Dezimal (0.3225 statt 32.25)
    if (retPct != null && retPct < 1) retPct = Math.round(retPct * 10000) / 100;
    const kunden= parseNum(g(r,'kunden'));
    // Durchschnittsbon: Excel hat Zeilenumbruch im Header
    const bon   = parseNum(g(r,'durch-\nschnitts-\nbon','durchschnittsbon','durch-schnittsbon','ø bon','bon'));
    // VK-Stunden
    const vkSoll= parseNum(g(r,'vk std\n soll','vk std soll','vk-std soll','vk_std_soll'));
    const vkIst = parseNum(g(r,'vk - std\nist','vk - std ist','vk std ist','vk-std ist','vk_std_ist'));
    // Stundenleistung
    const stlSoll=parseNum(g(r,'std - leistung\nsoll','std - leistung soll','stundenleistung soll','stl_soll'));
    const stlIst =parseNum(g(r,'std - leistung\nist','std - leistung ist','stundenleistung ist','stl_ist'));
    return {datum,wochentag:wt,ist_umsatz:ist,soll_umsatz:soll,
      retoure_pct:retPct!=null?Math.round(retPct*100)/100:null,
      kunden:kunden!=null?Math.round(kunden):null,bon,
      vk_std_soll:vkSoll,vk_std_ist:vkIst,stl_soll:stlSoll,stl_ist:stlIst};
  };
  const allMapped = rows.map(normRow);
  console.log('=== DEBUG Sheet Rows ===');
  console.log('Total rows:', rows.length);
  console.log('Headers:', rows[0] ? Object.keys(rows[0]).map(k=>JSON.stringify(k)) : 'none');
  console.log('First raw row:', rows[0]);
  console.log('First mapped:', allMapped[0]);
  console.log('Second mapped:', allMapped[1]);
  const data = allMapped.filter(r=>r.datum&&r.ist_umsatz>0)
    .sort((a,b)=>a.datum.localeCompare(b.datum));
  console.log('Valid rows after filter:', data.length);
  console.log('First valid:', data[0]);
  return buildFilialData(data, code);
}

function buildFilialData(data, code) {
  const FILIAL_NAMEN = {B1:'Brandstraße',B5:'Oberer Markt',B7:'Norisstraße',B8:'Knebelstraße',B11:'Waldluststraße',B12:'Laufamholzstraße',B16:'Vogelherdstraße'};
  const last14=data.slice(-14), last7=data.slice(-7), prev7=data.slice(-14,-7);
  const avg=(arr,k)=>{const v=arr.filter(r=>r[k]!=null).map(r=>r[k]);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length*100)/100:0;};
  const avg7={umsatz:avg(last7,'ist_umsatz'),soll_umsatz:avg(last7,'soll_umsatz'),
    retoure_pct:avg(last7,'retoure_pct'),kunden:Math.round(avg(last7,'kunden')),
    bon:avg(last7,'bon'),vk_std_soll:avg(last7,'vk_std_soll'),vk_std_ist:avg(last7,'vk_std_ist'),
    stl_soll:avg(last7,'stl_soll'),stl_ist:avg(last7,'stl_ist')};
  const prevU=avg(prev7,'ist_umsatz');
  const trend_pct=prevU>0?Math.round((avg7.umsatz-prevU)/prevU*1000)/10:0;
  const byMonth={};
  data.forEach(r=>{const m=r.datum.slice(0,7);if(!byMonth[m])byMonth[m]=[];byMonth[m].push(r);});
  const month_avgs={};
  Object.entries(byMonth).forEach(([m,arr])=>{
    const tot=arr.reduce((s,r)=>s+r.ist_umsatz,0);
    month_avgs[m]={umsatz:Math.round(tot/arr.length*100)/100,soll_umsatz:avg(arr,'soll_umsatz'),
      retoure_pct:avg(arr,'retoure_pct'),total:Math.round(tot*100)/100,
      stl_ist:avg(arr,'stl_ist'),stl_soll:avg(arr,'stl_soll')};
  });
  return {name:FILIAL_NAMEN[code]||code,code,last14,avg7,trend_pct,month_avgs,
    gesamt_umsatz:Math.round(data.reduce((s,r)=>s+r.ist_umsatz,0)*100)/100,
    heute:data[data.length-1]||null};
}

async function loadAllSheets(url) {
  const D={}, errors=[];
  for (const [name,code] of Object.entries(FILIAL_MAP)) {
    try {
      const rows = await loadSheet(url, code);
      if (rows.length===0) { errors.push(`${name}: keine Daten`); continue; }
      const result = processRows(rows, code);
      if (result) D[code] = result;
    } catch(e) { errors.push(`${name}: ${e.message}`); }
  }
  // Filialen ohne Live-Daten mit Fallback-Daten (Q1 2026) fuellen
  for (const code of CODES) {
    if (!D[code]) D[code] = FALLBACK[code];
  }
  return {D, errors};
}

// ════════════════════════════════════════════════════
// HILFSFUNKTIONEN
// ════════════════════════════════════════════════════
function fmt(n){if(n==null)return'–';return n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtK(n){return(n/1000).toLocaleString('de-DE',{minimumFractionDigits:1,maximumFractionDigits:1})+'k'}
function fmtD(d){if(!d)return'';const p=d.split('-');return p.length===3?p[2]+'.'+p[1]+'.':d}
function diffPct(ist,soll){if(!soll||!ist)return null;return Math.round((ist-soll)/soll*100)}
function topbar(label){return `<div class="topbar"><div class="tbl"><span class="tbl-title">Bäcker Bock</span><div class="tdiv"></div><span class="tname">Filial-Dashboard</span></div><div class="tbr"><span class="brole">${label}</span><button class="blogout" onclick="showLogin()">Abmelden</button></div></div>`;}
function destroyCharts(){if(c1){c1.destroy();c1=null;}if(c2){c2.destroy();c2=null;}}

function siBar(ist, soll, label, stCls) {
  if (!soll || !ist) return '';
  const pct = Math.min(Math.round(ist/soll*100), 150);
  const diff = ist-soll, dp = diffPct(ist,soll);
  const fillCls = pct>=95?'ok':pct>=80?'warn':'bad';
  return `<div class="si-row">
    <div class="si-label">${label}</div>
    <div class="si-bar"><div class="si-fill ${fillCls}" style="width:${Math.min(pct,100)}%"></div></div>
    <div class="si-val"><span class="st ${stCls||fillCls==='ok'?'st-good':fillCls==='warn'?'st-warn':'st-bad'}" style="font-size:11px">${ist.toFixed(1)} ${diff>=0?'▲':'▼'} ${dp>=0?'+':''}${dp}%</span></div>
  </div>`;
}

function getData() { return liveData || FALLBACK; }
function dataSource() { return liveData ? '🟢 Live (Google Sheets)' : '🟡 Q1 2026 (Offline)'; }

function showLogin() {
  destroyCharts();
  const D = getData();
  document.getElementById('app').innerHTML = `<div class="login-screen"><div class="lcard">
    <div class="ltag">Bäcker Bock Backwaren GmbH</div>
    <h2>Filial-Dashboard</h2>
    <div class="ldesc">${dataSource()}</div>

    <div style="background:${liveData?'var(--green-lt)':'var(--amber-lt)'};border:1.5px solid ${liveData?'var(--green)':'var(--amber)'};border-radius:var(--rsm);padding:12px 14px;margin-bottom:18px;text-align:left">
      ${liveData
        ? `<div style="font-size:12px;color:var(--green);font-weight:600">✅ Google Sheets verbunden</div>
           <button onclick="changeSheets()" style="background:none;border:none;color:var(--green);cursor:pointer;font-size:12px;text-decoration:underline;padding:0;margin-top:4px">URL ändern</button>`
        : `<div style="font-weight:600;font-size:13px;color:var(--amber);margin-bottom:6px">⚙️ Google Sheets verbinden</div>
           <div style="font-size:12px;color:var(--mid);margin-bottom:6px">Für Live-Daten: URL des Sheets einfügen (öffentlich lesbar)</div>
           <input class="sheets-input" id="sh-url" placeholder="https://docs.google.com/spreadsheets/d/..." value="${sheetsUrl}">
           <button class="btn-sm" onclick="connectSheets()">Verbinden & laden</button>
           <div id="conn-err" style="color:var(--red);font-size:12px;margin-top:6px"></div>
           <div style="font-size:11px;color:var(--light);margin-top:8px">Ohne Verbindung: Q1 2026-Daten werden angezeigt</div>`
      }
    </div>

    <select id="rs">
      <option value="">— Rolle wählen —</option>
      <option value="vl">Verkaufsleiter (alle Filialen)</option>
      ${CODES.map(c=>`<option value="${c}">Filialleitung: ${D[c].name}</option>`).join('')}
    </select>
    <button class="btn-login" onclick="doLogin()">Anmelden</button>
  </div></div>`;
  document.getElementById('sh-url')?.addEventListener('keydown', e=>{ if(e.key==='Enter') connectSheets(); });
}

async function connectSheets() {
  const url = (document.getElementById('sh-url')?.value||'').trim();
  if (!url) return;
  const btn = document.querySelector('.btn-sm');
  const errEl = document.getElementById('conn-err');
  btn.textContent='Lade…'; btn.disabled=true;
  if(errEl) errEl.textContent='';
  try {
    sheetsUrl = url;
    localStorage.setItem(CONFIG_KEY, url);
    const {D, errors} = await loadAllSheets(url);
    if (errors.length > 0) console.log('Hinweise:', errors.join('; '));
    liveData = D;
    showLogin();
  } catch(e) {
    if(errEl) errEl.textContent='⚠️ '+e.message;
    btn.textContent='Verbinden & laden'; btn.disabled=false;
  }
}
function changeSheets(){ liveData=null; showLogin(); }
function doLogin(){ const v=document.getElementById('rs')?.value; if(!v)return; v==='vl'?showVL():showFL(v); }

async function refreshData() {
  if (!sheetsUrl) return;
  try {
    const {D} = await loadAllSheets(sheetsUrl);
    if (Object.keys(D).length>0) liveData=D;
  } catch(e) {}
}

        <td style="font-weight:500">${d.wochentag.slice(0,2)} ${fmtD(d.datum)}</td>
        <td>${fmt(d.ist_umsatz)} €</td>
        <td style="color:${d.soll_umsatz?(d.ist_umsatz>=d.soll_umsatz?'var(--green)':'var(--red)'):'var(--xlight)'}">${d.soll_umsatz?fmt(d.soll_umsatz)+' €':'–'}</td>
        <td><span class="st ${retSt(d.retoure_pct)}">${d.retoure_pct!=null?d.retoure_pct.toFixed(1)+'%':'–'}</span></td>
        <td>${d.kunden||'–'}</td>
        <td>${d.bon!=null?fmt(d.bon)+' €':'–'}</td>
        ${a.stl_ist>0?`<td>${d.stl_ist!=null?`<span class="st ${stlSt(d.stl_ist)}">${d.stl_ist.toFixed(1)}</span>`:'–'}</td>`:''}</tr>`).join('')}
      </tbody>
    </table></div>
    <div class="legende">
      <div class="legende-item"><div class="legende-dot" style="background:var(--green)"></div><span style="color:var(--light)">Retoure 12–17% / Std-Lstg. 85–120</span></div>
      <div class="legende-item"><div class="legende-dot" style="background:var(--amber)"></div><span style="color:var(--light)">Retoure 17–22% / Std-Lstg. 70–85 od. 120–140</span></div>
      <div class="legende-item"><div class="legende-dot" style="background:var(--red)"></div><span style="color:var(--light)">Außerhalb Zielbereich</span></div>
    </div>
    </div>`;

    c1=new Chart(document.getElementById('c1'),{type:'bar',
      data:{labels:f.last14.map(d=>d.wochentag.slice(0,2)),datasets:[
        {label:'Ist',data:f.last14.map(d=>d.ist_umsatz),backgroundColor:f.last14.map((_,i)=>i>=7?'#0a0a0a':'#d0d0d0'),borderRadius:3,borderSkipped:false},
        {label:'Soll',data:f.last14.map(d=>d.soll_umsatz),type:'line',borderColor:'#b8860b',backgroundColor:'transparent',borderWidth:1.5,borderDash:[4,3],pointRadius:0,tension:0.3}
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmt(ctx.raw)+' €'}}},
        scales:{x:{grid:{display:false},ticks:{color:'#888',font:{family:'Inter'}}},y:{grid:{color:'rgba(0,0,0,.06)'},ticks:{color:'#888',callback:v=>v+'€',font:{family:'Inter'}}}}}});
  }

  function renderSollIst() {
    destroyCharts();
    const monate=Object.keys(f.month_avgs).sort();
    document.getElementById('mc').innerHTML=`
    <div class="card"><div class="ctitle">Soll/Ist-Vergleich Umsatz (Ø 7 Tage)</div>
      ${siBar(a.umsatz, a.soll_umsatz, 'Umsatz', a.umsatz>=a.soll_umsatz*0.95?'st-good':a.umsatz>=a.soll_umsatz*0.8?'st-warn':'st-bad')}
      <div style="margin-top:10px;font-size:12px;color:var(--light)">Soll: <strong style="color:var(--dark)">${fmt(a.soll_umsatz)} €</strong> · Ist: <strong style="color:var(--dark)">${fmt(a.umsatz)} €</strong></div>
    </div>

    <div class="card"><div class="ctitle">Stundenleistung (Ø 7 Tage)</div>
      <div class="sgrid" style="margin-bottom:14px">
        <div class="scard"><div class="snum">${a.stl_soll>0?a.stl_soll.toFixed(1):'–'}</div><div class="slabel">Soll</div></div>
        <div class="scard"><div class="snum">${a.stl_ist>0?a.stl_ist.toFixed(1):'–'}</div><div class="slabel">Ist</div>
          ${a.stl_ist>0?`<div class="st ${stlSt(a.stl_ist)}" style="margin-top:5px;font-size:10px">${a.stl_ist>=85&&a.stl_ist<=120?'Im Ziel':a.stl_ist>=70&&a.stl_ist<=140?'Grenzwertig':'Außerhalb'}</div>`:''}
        </div>
        <div class="scard"><div class="snum">${a.vk_std_soll>0?a.vk_std_soll.toFixed(1):'–'}</div><div class="slabel">VK-Std Soll</div></div>
      </div>
      ${a.stl_ist>0?siBar(a.stl_ist,a.stl_soll,'Std-Leistung',stlSt(a.stl_ist)):'<p style="font-size:12px;color:var(--light)">Ist-Stundenleistung für aktuelle Woche noch nicht vollständig eingetragen.</p>'}
      <div class="legende" style="margin-top:12px">
        <div class="legende-item"><div class="legende-dot" style="background:var(--green)"></div><span style="color:var(--light)">85–120 (Zielbereich)</span></div>
        <div class="legende-item"><div class="legende-dot" style="background:var(--amber)"></div><span style="color:var(--light)">70–85 / 120–140 (Grenzwertig)</span></div>
        <div class="legende-item"><div class="legende-dot" style="background:var(--red)"></div><span style="color:var(--light)">unter 70 / über 140</span></div>
      </div>
    </div>

    <div class="card"><div class="ctitle">Monatliche Entwicklung</div><div class="twrap"><table>
      <thead><tr><th>Monat</th><th>Ist-Umsatz</th><th>Soll-Umsatz</th><th>Abw.</th><th>Retoure</th><th>Std-Lstg. Ist</th></tr></thead>
      <tbody>${monate.map(m=>{const v=f.month_avgs[m];if(!v)return'';
        const dp=diffPct(v.umsatz,v.soll_umsatz);
        return `<tr>
          <td style="font-weight:500">${MNAMES[m]||m}</td>
          <td>${fmt(v.umsatz)} €</td>
          <td>${fmt(v.soll_umsatz)} €</td>
          <td><span class="strend ${dp>=0?'up':'down'}">${dp>=0?'+':''}${dp}%</span></td>
          <td><span class="st ${retSt(v.retoure_pct)}">${v.retoure_pct.toFixed(1)}%</span></td>
          <td>${v.stl_ist>0?`<span class="st ${stlSt(v.stl_ist)}">${v.stl_ist.toFixed(1)}</span>`:'–'}</td>
        </tr>`;}).join('')}
      </tbody>
    </table></div></div>`;
  }

  document.getElementById('nT').onclick=function(){document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));this.classList.add('active');renderUeber();};
  document.getElementById('nSI').onclick=function(){document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));this.classList.add('active');renderSollIst();};
  renderUeber();
}

// ════════════════════════════════════════════════════
// VERKAUFSLEITER
// ════════════════════════════════════════════════════
function showVL() {
  destroyCharts();
  const D=getData();
  const sorted=[...CODES].sort((a,b)=>D[b].avg7.umsatz-D[a].avg7.umsatz);
  const totalAvg=CODES.reduce((s,c)=>s+D[c].avg7.umsatz,0);
  const avgRet=CODES.reduce((s,c)=>s+D[c].avg7.retoure_pct,0)/CODES.length;
  const avgBon=CODES.reduce((s,c)=>s+D[c].avg7.bon,0)/CODES.length;
  const totalKunden=CODES.reduce((s,c)=>s+D[c].avg7.kunden,0);
  const gesamtQ=CODES.reduce((s,c)=>s+D[c].gesamt_umsatz,0);

  document.getElementById('app').innerHTML=`${topbar('Verkaufsleiter')}
  <div class="nav">
    <div class="ntab active" id="nU">Übersicht</div>
    <div class="ntab" id="nM">Monatsvergleich</div>
    <div class="ntab" id="nSI">Soll/Ist alle</div>
  </div>
  <div class="main" id="mc"></div>`;

  function renderUeber() {
    destroyCharts();
    document.getElementById('mc').innerHTML=`
    <div style="display:flex;justify-content:flex-end;margin-bottom:8px">
      <span style="font-size:11px;color:var(--light)">${dataSource()} · <button onclick="refreshAndRedraw()" style="background:none;border:none;color:var(--light);cursor:pointer;font-size:11px;text-decoration:underline">↻ Aktualisieren</button></span>
    </div>
    <div class="card"><div class="ctitle">Gesamtübersicht (Ø letzte 7 Tage)</div>
      <div class="sgrid">
        <div class="scard"><div class="snum">${fmtK(totalAvg)}</div><div class="slabel">Tagesumsatz gesamt</div></div>
        <div class="scard"><div class="snum">${avgRet.toFixed(1)}%</div><div class="slabel">Ø Retourenquote</div>
          <div class="st ${retSt(avgRet)}" style="margin-top:5px;font-size:10px">${avgRet<=17?'Im Ziel':avgRet<=22?'Grenzwertig':'Über Ziel'}</div></div>
        <div class="scard"><div class="snum">${avgBon.toFixed(2)}</div><div class="slabel">Ø Kundenbon €</div></div>
        <div class="scard"><div class="snum">${totalKunden}</div><div class="slabel">Kunden / Tag</div></div>
      </div>
    </div>
    <div class="card"><div class="ctitle">Filial-Ranking (Ø 7 Tage)</div><div class="twrap"><table>
      <thead><tr><th>#</th><th>Filiale</th><th>Ø Ist-Umsatz</th><th>Retoure</th><th>Ø Bon</th><th>Kunden</th><th>Std-Lstg.</th><th>Trend</th></tr></thead>
      <tbody>${sorted.map((c,i)=>{const f=D[c];return `<tr class="clickable" data-c="${c}">
        <td><span class="rank-badge ${i<3?'rank-'+(i+1):''}">${i+1}</span></td>
        <td style="font-weight:600">${f.name}</td>
        <td>${fmt(f.avg7.umsatz)} €</td>
        <td><span class="st ${retSt(f.avg7.retoure_pct)}">${f.avg7.retoure_pct.toFixed(1)}%</span></td>
        <td>${fmt(f.avg7.bon)} €</td>
        <td>${f.avg7.kunden}</td>
        <td>${f.avg7.stl_ist>0?`<span class="st ${stlSt(f.avg7.stl_ist)}">${f.avg7.stl_ist.toFixed(1)}</span>`:'–'}</td>
        <td><span class="strend ${f.trend_pct>=0?'up':'down'}">${f.trend_pct>=0?'▲':'▼'} ${Math.abs(f.trend_pct).toFixed(1)}%</span></td>
      </tr>`;}).join('')}</tbody>
    </table></div></div>
    <div class="card"><div class="ctitle">Ø Tagesumsatz nach Filiale</div><div style="position:relative;height:${CODES.length*44+60}px"><canvas id="c1"></canvas></div></div>
    <div class="card"><div class="ctitle">Q1-Gesamtumsatz: ${fmtK(gesamtQ)} €</div>
      <div class="sgrid">${CODES.map(c=>`<div class="scard"><div class="snum" style="font-size:1.2rem">${fmtK(D[c].gesamt_umsatz)}</div><div class="slabel">${D[c].name}</div></div>`).join('')}</div>
    </div>`;

    document.querySelectorAll('[data-c]').forEach(r=>r.onclick=()=>showFL(r.dataset.c));
    c1=new Chart(document.getElementById('c1'),{type:'bar',
      data:{labels:sorted.map(c=>D[c].name),datasets:[
        {label:'Ist',data:sorted.map(c=>D[c].avg7.umsatz),backgroundColor:sorted.map((_,i)=>i===0?'#0a0a0a':'#d0d0d0'),borderRadius:4,borderSkipped:false}
      ]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.raw)+' €'}}},
        scales:{x:{grid:{color:'rgba(0,0,0,.06)'},ticks:{callback:v=>v+'€',color:'#888',font:{family:'Inter'}}},y:{grid:{display:false},ticks:{color:'#333',font:{family:'Inter',weight:600}}}}}});
  }

  function renderMonat() {
    destroyCharts();
    const monate=['2026-01','2026-02','2026-03'];
    const colors=['#0a0a0a','#1a7a3a','#b8860b','#c0392b','#1a4a7a','#888','#555'];
    document.getElementById('mc').innerHTML=`
    <div class="card"><div class="ctitle">Monatsumsatz je Filiale</div>
      <div style="position:relative;height:300px"><canvas id="c2"></canvas></div>
    </div>
    <div class="card"><div class="ctitle">Retourenquote im Monatsverlauf</div><div class="twrap"><table>
      <thead><tr><th>Filiale</th>${monate.map(m=>`<th>${MNAMES[m]}</th>`).join('')}<th>Trend</th></tr></thead>
      <tbody>${CODES.map(c=>{const f=D[c];const vals=monate.map(m=>f.month_avgs[m]?.retoure_pct||0);const trend=vals[2]-vals[0];return `<tr>
        <td style="font-weight:600">${f.name}</td>
        ${vals.map(v=>`<td><span class="st ${retSt(v)}">${v.toFixed(1)}%</span></td>`).join('')}
        <td><span class="strend ${trend<=0?'up':'down'}">${trend<=0?'▼':'▲'} ${Math.abs(trend).toFixed(1)}pp</span></td>
      </tr>`;}).join('')}</tbody>
    </table></div></div>`;
    c2=new Chart(document.getElementById('c2'),{type:'bar',
      data:{labels:monate.map(m=>MNAMES[m]),datasets:CODES.map((c,i)=>({label:D[c].name,data:monate.map(m=>D[c].month_avgs[m]?.total||0),backgroundColor:colors[i],borderRadius:3}))},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmtK(ctx.raw)+' €'}}},
        scales:{x:{grid:{display:false},ticks:{color:'#888',font:{family:'Inter'}}},y:{grid:{color:'rgba(0,0,0,.06)'},ticks:{callback:v=>fmtK(v),color:'#888',font:{family:'Inter'}}}}}});
    const lg=document.createElement('div');
    lg.style.cssText='display:flex;flex-wrap:wrap;gap:12px;margin-top:8px;font-size:12px;color:#555;padding:0 20px 16px';
    CODES.forEach((c,i)=>{lg.innerHTML+=`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:${colors[i]}"></span>${D[c].name}</span>`;});
    document.getElementById('c2').parentElement.after(lg);
  }

  function renderSollIst() {
    destroyCharts();
    const monate=['2026-01','2026-02','2026-03'];
    document.getElementById('mc').innerHTML=`
    <div class="card"><div class="ctitle">Umsatz & Stundenleistung alle Filialen (Ø 7 Tage)</div>
      ${CODES.map(c=>{const f=D[c],a=f.avg7;
        return `<div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)">
          <div style="font-weight:600;font-size:13px;margin-bottom:8px">${f.name}</div>
          ${siBar(a.umsatz,a.soll_umsatz,'Umsatz',a.umsatz>=a.soll_umsatz*0.95?'st-good':a.umsatz>=a.soll_umsatz*0.8?'st-warn':'st-bad')}
          ${a.stl_ist>0?siBar(a.stl_ist,a.stl_soll,'Std-Leistung',stlSt(a.stl_ist)):''}
        </div>`;}).join('')}
    </div>
    <div class="card"><div class="ctitle">Monatliche Soll/Ist-Abweichung Umsatz</div><div class="twrap"><table>
      <thead><tr><th>Filiale</th>${monate.map(m=>`<th>${MNAMES[m]}</th>`).join('')}</tr></thead>
      <tbody>${CODES.map(c=>{const f=D[c];return `<tr>
        <td style="font-weight:600">${f.name}</td>
        ${monate.map(m=>{const v=f.month_avgs[m];if(!v)return'<td>–</td>';
          const dp=diffPct(v.umsatz,v.soll_umsatz);
          return `<td><span class="strend ${dp>=0?'up':'down'}">${dp>=0?'+':''}${dp}%</span></td>`;}).join('')}
      </tr>`;}).join('')}</tbody>
    </table></div></div>`;
  }

  async function refreshAndRedraw() {
    await refreshData();
    renderUeber();
  }

  document.getElementById('nU').onclick=function(){document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));this.classList.add('active');renderUeber();};
  document.getElementById('nM').onclick=function(){document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));this.classList.add('active');renderMonat();};
  document.getElementById('nSI').onclick=function(){document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));this.classList.add('active');renderSollIst();};
  renderUeber();
}

    document.getElementById('app').innerHTML=`<div class="loading"><div class="spinner"></div><div style="font-size:13px">Lade Daten aus Google Sheets…</div></div>`;
    try {
      const {D, errors} = await loadAllSheets(sheetsUrl);
      if (Object.keys(D).length > 0) liveData = D;
